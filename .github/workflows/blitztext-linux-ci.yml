name: BlitztextLinux CI

on:
  push:
    branches: ["**"]
    paths:
      - "BlitztextLinux/**"
      - ".github/workflows/blitztext-linux-ci.yml"
  pull_request:
    paths:
      - "BlitztextLinux/**"
      - ".github/workflows/blitztext-linux-ci.yml"

concurrency:
  group: blitztext-linux-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: BlitztextLinux
    env:
      # Qt headless: Offscreen-Plattform, damit GUI-Tests ohne Display laufen.
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: BlitztextLinux/requirements-dev.txt

      - name: Install Qt offscreen system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile-check (Syntax)
        run: python -m compileall app

      - name: Run test suite (inkl. GUI offscreen)
        env:
          WHISPER_GUI_TESTS: "1"
        run: python -m pytest tests/ -v
